name: Validate OID entries

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: node scripts/validate-oids.js

  # Direkte Commits auf main (z. B. übers CMS) durchlaufen keinen PR/Review -
  # bei einem Fehlschlag auf main daher als Issue melden, statt es nur im
  # Actions-Log verschwinden zu lassen. Auf PRs/Feature-Branches ist der rote
  # Check schon direkt sichtbar, daher keine zusätzliche Meldung nötig.
  notify-on-failure:
    needs: validate
    if: failure() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const commitUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/commit/${context.sha}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `OID-Validierung fehlgeschlagen (${context.sha.slice(0, 7)})`,
              body: `Ein Push auf \`main\` hat die OID-Validierung nicht bestanden.\n\n- Commit: ${commitUrl}\n- Workflow-Log: ${runUrl}\n\nBitte den fehlerhaften Eintrag korrigieren (Details im Workflow-Log).`,
              assignees: [context.actor],
            });
