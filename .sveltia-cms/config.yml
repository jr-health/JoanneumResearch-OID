# Sveltia CMS – Konfiguration für das JR-OID-Registry
# Doku: https://github.com/sveltia/sveltia-cms
#
# Backend: GitHub (Umstieg von Gitea -> GitHub).
# Sveltia CMS stellt – anders als das alte Netlify git-gateway – KEINEN
# gemeinsamen OAuth-Server bereit. Für den Produktivbetrieb muss einmalig ein
# OAuth-Relay deployed werden (z. B. `sveltia-cms-auth` auf Cloudflare Workers):
#   1. GitHub OAuth App anlegen (Homepage = https://oid.joanneum.at,
#      Callback = https://<dein-relay>/callback).
#   2. Relay mit Client-ID/Secret deployen.
#   3. `base_url` (+ ggf. `auth_endpoint`) unten auf das Relay setzen.
#
# Für lokales Testen ist KEIN Proxy-Server und KEIN `local_backend` nötig
# (anders als beim alten Netlify/Decap CMS) – siehe README, Abschnitt
# "Sveltia CMS lokal ausführen": einfach admin/index.html per Chromium-
# Browser (Chrome/Edge/Brave) öffnen und über "Work with Local Repository"
# direkt den Projektordner auswählen.

backend:
  name: github
  repo: jr-health/JoanneumResearch-OID
  branch: main
  base_url: https://sveltia-cms-auth.jr-health.workers.dev
  # auth_endpoint: auth                          # Default; nur bei abweichendem Relay ändern
  commit_messages:
    create: 'OID: {{slug}} angelegt ({{collection}})'
    update: 'OID: {{slug}} aktualisiert ({{collection}})'
    delete: 'OID: {{slug}} entfernt ({{collection}})'
    openAuthoring: '{{message}}'

# Änderungen laufen als Draft/Review/Publish über Pull Requests (passt zum
# OID-Governance-Prozess). Für direktes Commit auf `main` diese Zeile entfernt lassen.
# HINWEIS: funktioniert nur gegen das echte GitHub-Backend, nicht im lokalen
# "Work with Local Repository"-Modus (der macht ohnehin keine Git-Operationen).
# publish_mode: editorial_workflow

# Das Registry verwaltet keine Medien; Uploads werden nicht benötigt.
media_folder: assets/uploads
public_folder: /assets/uploads

# Dateinamen bleiben nah am symbolicName (das Pattern erlaubt bereits nur
# Kleinbuchstaben/Ziffern/Bindestriche).
slug:
  encoding: ascii
  clean_accents: true

collections:
  # ---------------------------------------------------------------------------
  # dotNotation und category sind je Collection unterschiedlich (eigener Default-
  # Präfix bzw. eigener EHSREG-Kategorie-Default) und daher pro Collection einzeln
  # ausgeschrieben. Die übrigen 8 Felder sind über alle Collections hinweg
  # identisch und werden EINMAL hier (in "organization") per YAML-Anker je Feld
  # definiert (&f_xxx) und in jeder weiteren Collection per Alias (*f_xxx)
  # wiederverwendet. YAML-Merge-Keys (`<<`) werden von CMS-YAML-Parsern nicht
  # zuverlässig unterstützt – deshalb Anker/Alias statt Merge.
  # ---------------------------------------------------------------------------
  - name: organization
    label: '0 · Organization'
    label_singular: 'OID-Eintrag'
    description: 'Organisations-Root-Knoten (der JR-OID-Root selbst, 2.16.840.1.113883.2.16.3.1.21). create/delete deaktiviert – über die CMS-Oberfläche kann kein weiterer Eintrag angelegt oder der bestehende gelöscht werden.'
    folder: oids/0-organization
    create: false
    delete: false
    format: json
    extension: json
    identifier_field: symbolicName
    slug: '{{fields.symbolicName}}'
    summary: '{{fields.dotNotation}} — {{fields.symbolicName}} · {{fields.responsibleAuthority.person_name}}'
    sortable_fields:
      fields: [dotNotation, symbolicName, status, creationDate]
      default: {field: dotNotation, direction: ascending}
    fields:
      - name: dotNotation
        label: 'OID (Dot Notation)'
        widget: string
        required: true
        pattern: ['^\d+(\.\d+)+$', 'Nur Ziffern und Punkte, z. B. 2.16.840.1.113883.2.16.3.1.21.6.1']
        hint: 'Vollständige OID unterhalb von 2.16.840.1.113883.2.16.3.1.21. Muss repo-weit eindeutig sein. Max. 255 Zeichen (empf. ≤ 64 für DICOM-Kompatibilität).'
        default: '2.16.840.1.113883.2.16.3.1.21'
      - name: category
        label: 'Kategorie'
        widget: select
        required: true
        default: organization
        hint: 'Offizieller EHSREG-Objekttyp (OID-Leitfaden Tabelle 3). Für den Root-Knoten immer „organization".'
        options:
          - identificationscheme
          - organization
          - person
          - community
          - codingscheme
          - document
          - alias
          - template
          - experimental
      - &f_symbolicName
        name: symbolicName
        label: 'Symbolischer Name'
        widget: string
        required: true
        pattern: ['^(?=.{1,25}$)[a-z][a-z0-9]*(-[a-z0-9]+)*$', 'Kleinbuchstaben/Ziffern/Bindestriche, Beginn mit Buchstabe, max. 25 Zeichen, keine führenden/abschließenden/doppelten Bindestriche']
        hint: 'z. B. prenudge-appdata-r4. Repo-weit eindeutig.'
      - &f_status
        name: status
        label: 'Status'
        widget: select
        required: true
        default: active
        options: [active, inactive, retired, pending]
        hint: '„active": aktiv in Verwendung. „pending": beantragt/reserviert, noch nicht final vergeben. „inactive": vorübergehend nicht in Verwendung. „retired": dauerhaft abgelöst/deaktiviert. Vergebene OIDs werden nie gelöscht – zum Deaktivieren „retired" setzen.'
      - &f_description
        name: description
        label: 'Beschreibung (DE + EN)'
        widget: list
        required: true
        min: 2
        max: 2
        summary: '{{fields.lang}}: {{fields.text}}'
        hint: 'Genau ein Eintrag für „de" und einer für „en" – beide verpflichtend.'
        fields:
          - {name: lang, label: 'Sprache', widget: select, options: [de, en], required: true}
          - {name: text, label: 'Text', widget: string, required: true}
        default:
          - {lang: de, text: ''}
          - {lang: en, text: ''}
      - &f_registrationAuthority
        name: registrationAuthority
        label: 'Registration Authority'
        widget: string
        required: true
        default: 'JOANNEUM RESEARCH Forschungsgesellschaft mbH'
      - &f_responsibleAuthority
        name: responsibleAuthority
        label: 'Verantwortliche Stelle'
        widget: object
        required: true
        fields:
          - {name: person_name, label: 'Person', widget: string, required: true}
          - {name: organization_name, label: 'Organisation', widget: string, default: 'JOANNEUM RESEARCH Forschungsgesellschaft mbH', required: true}
          - {name: organization_telecom, label: 'E-Mail / Telecom', widget: string, required: true, pattern: ['.+@.+\..+', 'Bitte eine gültige E-Mail-Adresse angeben']}
      - &f_creationDate
        name: creationDate
        label: 'Erstellungsdatum'
        widget: datetime
        required: true
        format: 'YYYY-MM-DD'
        date_format: 'YYYY-MM-DD'
        time_format: false
        picker_utc: true
      - &f_lastmodifiedDate
        name: lastmodifiedDate
        label: 'Letzte Änderung'
        widget: datetime
        required: true
        format: 'YYYY-MM-DDTHH:mm:ssZ'
        date_format: 'YYYY-MM-DD'
        time_format: 'HH:mm'
        picker_utc: true
        hint: 'Wird nach dem Speichern automatisch per CI korrigiert, falls sich sonstiger Inhalt geändert hat — muss nicht manuell gepflegt werden (außer bei der Ersterstellung).'
      - &f_link_uri
        name: link_uri
        label: 'Link / URI'
        widget: string
        required: false
        pattern: ['^https?://.+', 'Muss mit http:// oder https:// beginnen']
        hint: 'Optional: IG-Repo, Studienseite, Doku o. Ä.'

